  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">

      <span class="cerrar">✖</span>
      <button id="btn-shiny" class="btn-shiny">✨</button>

      <!-- 🔥 Flecha izquierda -->
      <button id="prev-pokemon" class="flecha flecha-izq">⟨</button>

      <!-- 🔥 Flecha derecha -->
      <button id="next-pokemon" class="flecha flecha-der">⟩</button>

      <img id="modal-img">
      <h2 id="modal-nombre"></h2>
      <p id="modal-numero"></p>
      <p id="modal-tipo"></p>
      <p id="modal-desc"></p>

    </div>
  </div>

  <!-- HEADER -->
  <header>
    <h1>Pokédex</h1>
    <p>Explora por generaciones</p>

    <nav>
      <ul class="menu">
        <li><button onclick="cargarGeneracion(1, event)">Gen 1</button></li>
        <li><button onclick="cargarGeneracion(2, event)">Gen 2</button></li>
        <li><button onclick="cargarGeneracion(3, event)">Gen 3</button></li>
        <li><button onclick="cargarGeneracion(4, event)">Gen 4</button></li>

        <li><button onclick="cargarGeneracion(8, event)">Gen 8</button></li>
        <li><button onclick="cargarGeneracion(9, event)">Gen 9</button></li>
      </ul>
    </nav>
  </header>

  <div class="buscador-container">
    <input type="text" id="buscador" placeholder="Buscar por nombre o número...">
  </div>

  <div class="contador-container">
    <p id="contador">Mostrando 0 Pokémon</p>

    <button class="tipo-box reset boton-todos" data-tipo="todos">
      Mostrar todos
    </button>

    <button id="btn-random" class="boton-random">
      Pokémon aleatorio
    </button>
    
    <button id="btn-champions" class="boton-champions">
      Champions
    </button>

  </div>

  <div class="leyenda">
    <button class="tipo-box" data-tipo="Fuego">Fuego</button>

    <button class="tipo-box" data-tipo="Psíquico">Psíquico</button>

  <main>

  </main>

    <p>Proyecto personal de Pokédex</p>

    function cargarGeneracion(gen, event) {
      if (animandoGeneracion) return;
      animandoGeneracion = true;
      generacionActual = gen;

      pokedex.classList.remove("pokedex-entrada");
      pokedex.classList.add("pokedex-salida");

      setTimeout(() => {
        pokedex.innerHTML = "";

        document.querySelectorAll(".tipo-box").forEach(b => b.classList.remove("activo"));
        document.querySelector('[data-tipo="todos"]').classList.add("activo");

        const datos = generaciones[gen];
        if (!datos) {
          contador.textContent = "No hay datos para esta generación";
          pokedex.classList.remove("pokedex-salida");
          animandoGeneracion = false;
          return;
        }

        datos.nombres.forEach((nombre, index) => {
          const numero = (index + datos.inicio).toString().padStart(3, "0");
          const card = document.createElement("article");
          card.className = "pokemon";
          card.dataset.numero = numero;
          card.style.animationDelay = `${index * 0.018}s`;

          const info = infoPokemon[numero];

          if (info) {
            const tipos = info.tipo.split(" / ");

            if (tipos.length === 2) {
              const color1 = coloresTipo[tipos[0]];
              const color2 = coloresTipo[tipos[1]];

              if (color1 && color2) {
                card.style.background = `linear-gradient(to right, ${color1} 50%, ${color2} 50%)`;
              }
            } else {
              const color = coloresTipo[tipos[0]];
              if (color) {
                card.style.backgroundColor = color;
              }
            }
          }

          card.innerHTML = `
            <img src="imagenes/${numero}.png" alt="${nombre}">
            <h2>${nombre}</h2>
            <p>#${numero}</p>
          `;

          card.addEventListener("click", () => {
            abrirModal(nombre, numero);
          });

          pokedex.appendChild(card);
        });

        document.querySelectorAll(".menu button").forEach(btn => btn.classList.remove("activo"));

        const btnChampions = document.getElementById("btn-champions");
        if (btnChampions) {
          btnChampions.classList.remove("activo");
        }

        if (event) {
          event.target.classList.add("activo");
        } else {
          const botonInicial = document.querySelector(`.menu button:nth-child(${gen})`);
          document.querySelector(".menu button")?.classList.add("activo");
        }

        buscador.value = "";
        filtrar();

        pokedex.classList.remove("pokedex-salida");
        pokedex.classList.add("pokedex-entrada");

        setTimeout(() => {
          pokedex.classList.remove("pokedex-entrada");
          animandoGeneracion = false;
        }, 650);
      }, 280);
    }

    function filtrar() {
      const texto = buscador.value.toLowerCase().trim();
      const tipoActivo = document.querySelector(".tipo-box.activo")?.dataset.tipo;

      document.querySelectorAll(".pokemon").forEach(card => {
        const nombre = card.querySelector("h2").textContent.toLowerCase();
        const numero = card.dataset.numero;
        const info = infoPokemon[numero];

        const coincideBusqueda =
          nombre.includes(texto) ||
          numero.includes(texto) ||
          ("#" + numero).includes(texto);

        const coincideTipo =
          !tipoActivo ||
          tipoActivo === "todos" ||
          (info && info.tipo.includes(tipoActivo));

        card.style.display = coincideBusqueda && coincideTipo ? "block" : "none";
      });

      actualizarContador();
    }

    function actualizarContador() {
      const cards = document.querySelectorAll(".pokemon");
      let visibles = 0;

      cards.forEach(card => {
        if (card.style.display !== "none") visibles++;
      });

      const tipoActivo = document.querySelector(".tipo-box.activo")?.dataset.tipo;
      const textoBusqueda = buscador.value.trim();

      let mensaje = `Mostrando ${visibles} de ${cards.length} Pokémon`;

      if (tipoActivo && tipoActivo !== "todos") mensaje += ` tipo ${tipoActivo}`;
      if (textoBusqueda !== "") mensaje += ` con "${textoBusqueda}"`;

      contador.textContent = mensaje;
    }

    function buscarPokemonPorNombre(nombreBuscado) {
  for (const gen in generaciones) {
    const datos = generaciones[gen];

    const index = datos.nombres.findIndex(nombre =>
      nombre.toLowerCase() === nombreBuscado.toLowerCase()
    );

    if (index !== -1) {
      const numero = (index + datos.inicio).toString().padStart(3, "0");

      return {
        nombre: datos.nombres[index],
        numero: numero
      };
    }
  }

  return null;
}

  card.className = "pokemon";
  card.dataset.numero = numero;
  card.style.animationDelay = `${index * 0.018}s`;

  const info = infoPokemon[numero];

  if (info) {
    const tipos = info.tipo.split(" / ");

    if (tipos.length === 2) {
      const color1 = coloresTipo[tipos[0]];
      const color2 = coloresTipo[tipos[1]];

      if (color1 && color2) {
        card.style.background = `linear-gradient(to right, ${color1} 50%, ${color2} 50%)`;
      }
    } else {
      const color = coloresTipo[tipos[0]];

      if (color) {
        card.style.backgroundColor = color;
      }
    }
  }

  card.innerHTML = `
    <img src="imagenes/${numero}.png" alt="${nombre}">
    <h2>${nombre}</h2>
    <p>#${numero}</p>
  `;

  card.addEventListener("click", () => {
    abrirModal(nombre, numero);
  });

  pokedex.appendChild(card);
}

    function cargarChampions() {
      pokedex.innerHTML = "";

      buscador.value = "";

      document.querySelectorAll(".menu button")
        .forEach(btn => btn.classList.remove("activo"));

      document.querySelectorAll(".tipo-box")
        .forEach(btn => btn.classList.remove("activo"));

      document.querySelector('[data-tipo="todos"]').classList.add("activo");

      const btnChampions = document.getElementById("btn-champions");
      if (btnChampions) {
        btnChampions.classList.add("activo");
      }

      let encontrados = 0;
      let noEncontrados = [];

      pokemonChampions.forEach((nombreChampions) => {
        const pokemon = buscarPokemonPorNombre(nombreChampions);

        if (pokemon) {
          pintarCardPokemon(pokemon.nombre, pokemon.numero, encontrados);
          encontrados++;
        } else {
          noEncontrados.push(nombreChampions);
        }
      });

      filtrar();

      if (noEncontrados.length > 0) {
        console.warn("No encontrados en tus generaciones:", noEncontrados);
      }

      contador.textContent = `Mostrando ${encontrados} Pokémon de Champions`;
    }

    function abrirModal(nombre, numero) {
      
      // Guardar los Pokémon visibles
      listaActual = Array.from(document.querySelectorAll(".pokemon"))
        .filter(card => card.style.display !== "none");

      // Encontrar el índice actual
      indiceActual = listaActual.findIndex(card => card.dataset.numero === numero);

      const modal = document.getElementById("modal");
      const modalContent = document.querySelector(".modal-content");

      modal.style.display = "flex";

      document.getElementById("modal-img").src = `imagenes/${numero}.png`;
      // Resetear estado shiny al abrir
      esShinyActivo = false;

      const img = document.getElementById("modal-img");
      const btnShiny = document.getElementById("btn-shiny");

      btnShiny.classList.remove("activo");

      // Evento botón shiny
      btnShiny.onclick = () => {
        esShinyActivo = !esShinyActivo;

        if (esShinyActivo) {
          img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/shiny/${parseInt(numero)}.png`;
          btnShiny.classList.add("activo");
        } else {
          img.src = `imagenes/${numero}.png`;
          btnShiny.classList.remove("activo");
        }
      };

      document.getElementById("modal-nombre").textContent = nombre;
      document.getElementById("modal-numero").textContent = "#" + numero;

      const info = infoPokemon[numero];

      document.getElementById("modal-tipo").textContent =
        info ? "Tipo: " + info.tipo : "Tipo: Desconocido";

      document.getElementById("modal-desc").textContent =
        info ? info.descripcion : "Sin descripción disponible";

      // Cambiar el fondo del modal según el tipo del Pokémon
      if (info) {
        const tipos = info.tipo.split(" / ");

        if (tipos.length === 2) {
          const color1 = coloresTipo[tipos[0]];
          const color2 = coloresTipo[tipos[1]];

          if (color1 && color2) {
            modalContent.style.background = `linear-gradient(to right, ${color1} 50%, ${color2} 50%)`;
          }
        } else {
          const color = coloresTipo[tipos[0]];

          if (color) {
            modalContent.style.background = color;
          }
        }

        // Si el tipo es Siniestro, ponemos el texto en blanco para que se lea bien
        if (info.tipo.includes("Siniestro")) {
          modalContent.style.color = "white";
        } else {
          modalContent.style.color = "black";
        }
      } else {
        modalContent.style.background = "white";
        modalContent.style.color = "black";
      }
    }

    function cerrarModal() {
      document.getElementById("modal").style.display = "none";
    }

    document.getElementById("modal").addEventListener("click", function(e) {
      if (e.target.id === "modal") cerrarModal();
    });

    document.querySelectorAll(".tipo-box").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tipo-box").forEach(b => b.classList.remove("activo"));
        btn.classList.add("activo");
        filtrar();
      });
    });

    function pokemonAleatorio() {
      const cardsVisibles = Array.from(document.querySelectorAll(".pokemon"))
        .filter(card => card.style.display !== "none");

      if (cardsVisibles.length === 0) {
        contador.textContent = "No hay Pokémon visibles para elegir";
        return;
      }

      const indiceAleatorio = Math.floor(Math.random() * cardsVisibles.length);
      const cardElegida = cardsVisibles[indiceAleatorio];

      const nombre = cardElegida.querySelector("h2").textContent;
      const numero = cardElegida.dataset.numero;

      cardElegida.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

      cardElegida.classList.add("pokemon-elegido");

      setTimeout(() => {
        abrirModal(nombre, numero);
      }, 500);

      setTimeout(() => {
        cardElegida.classList.remove("pokemon-elegido");
      }, 1500);
    }

    function siguientePokemon() {
      if (listaActual.length === 0) return;

      indiceActual = (indiceActual + 1) % listaActual.length;

      const card = listaActual[indiceActual];
      const nombre = card.querySelector("h2").textContent;
      const numero = card.dataset.numero;

      abrirModal(nombre, numero);
    }

    function anteriorPokemon() {
      if (listaActual.length === 0) return;

      indiceActual = (indiceActual - 1 + listaActual.length) % listaActual.length;

      const card = listaActual[indiceActual];
      const nombre = card.querySelector("h2").textContent;
      const numero = card.dataset.numero;

      abrirModal(nombre, numero);
    }

    document.addEventListener("keydown", (e) => {
      if (document.getElementById("modal").style.display === "flex") {
        if (e.key === "ArrowRight") siguientePokemon();
        if (e.key === "ArrowLeft") anteriorPokemon();
      }
    });

    document.getElementById("next-pokemon").addEventListener("click", (e) => {
      e.stopPropagation();
      siguientePokemon();
    });

    document.getElementById("prev-pokemon").addEventListener("click", (e) => {
      e.stopPropagation();
      anteriorPokemon();
    });

    buscador.addEventListener("input", () => {
      filtrar();
    });

    document.getElementById("btn-random").addEventListener("click", () => {
      pokemonAleatorio();
    });

    document.querySelector(".cerrar").addEventListener("click", (e) => {
      e.stopPropagation();
      cerrarModal();
    });

    document.getElementById("btn-champions").addEventListener("click", () => {
      cargarChampions();
    });

    cargarGeneracion(1);
    document.querySelector(".menu button").classList.add("activo");
  </script>
</body>
</html>
